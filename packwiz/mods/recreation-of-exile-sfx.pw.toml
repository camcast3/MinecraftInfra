name = "Recreation of Exile - SFX"
filename = "RoE_SFX-0.0.3.jar"
side = "both"

# Re-hosted via GitHub Release because CurseForge returns
# `<Nil N="downloadUrl" />` for this project — its files require browser
# license click-through and packwiz-installer cannot fetch them directly.
#
# Admin runbook (per packwiz/README.md "Re-hosted CF-blocked mods" section):
#   1. Open the CF page and download the matching Forge 1.20.1 file
#      manually (browser-only, completes the license click-through).
#   2. Verify the redistribution clause in the mod's license file is
#      compatible with attaching the JAR to a public GitHub Release.
#      The CF project description for this mod includes an explicit
#      "You can use this in your modpack" permission (verified for
#      v0.0.3 by PR 2). Re-confirm on each upstream bump in case the
#      author updates their terms — record the outcome in the PR.
#   3. Upload the JAR to the `c2e2-blobs-v<PACK_VERSION>` release.
#   4. Update `filename` to match the JAR you uploaded.
#   5. Replace the FILL_IN placeholders below with the real download URL
#      and the file's actual SHA-256 hash (Get-FileHash <jar> -Algorithm SHA256).
#   6. Update [update.curseforge] file-id to the current CF file-id so PR 4's
#      daily workflow can still notice upstream version bumps.
#   7. From `packwiz/`, run `packwiz refresh` to regenerate index.toml.
[download]
url = "https://github.com/camcast3/MinecraftInfra/releases/download/c2e2-blobs-v0.3.0/RoE_SFX-0.0.3.jar"
hash-format = "sha256"
hash = "a7682cdd5810249e47da228ba40c3ca6f44d29c93a7fea48dff7edef7bfa29f0"
mode = "url"

# See ftb-placeholders.pw.toml for the rationale on keeping
# [update.curseforge] alongside `mode = "url"`.
[update]
[update.curseforge]
file-id = 6240763
project-id = 1207903
