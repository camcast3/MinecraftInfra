#cloud-config
# infra/proxmox/cloud-init.yaml
#
# Cloud-init user-data for the Proxmox Debian 13 VM that runs the C2E2 modded server.
#
# How to use in Proxmox:
#   1. Download a Debian 13 cloud image and create a VM template:
#        wget https://cloud.debian.org/images/cloud/trixie/latest/debian-13-genericcloud-amd64.qcow2
#        qm create 9000 --name debian13-template --memory 2048 --cores 2 --net0 virtio,bridge=vmbr0
#        qm importdisk 9000 debian-13-genericcloud-amd64.qcow2 local-lvm
#        qm set 9000 --scsihw virtio-scsi-single --scsi0 local-lvm:vm-9000-disk-0
#        qm set 9000 --ide2 local-lvm:cloudinit --boot c --bootdisk scsi0 --serial0 socket --vga serial0
#        qm set 9000 --machine q35 --bios ovmf --agent enabled=1
#        qm template 9000
#
#   2. Clone the template for the MC VM:
#        qm clone 9000 100 --name mc-proxmox --full
#        qm resize 100 scsi0 500G
#        qm set 100 --memory 32768 --cores 8 --cpu host
#
#   3. Configure cloud-init via Proxmox GUI (VM → Cloud-Init tab):
#        User:       mcsvc
#        SSH key:    paste contents of ~/.ssh/id_ed25519.pub
#        IP config:  DHCP (or static if preferred)
#
#   4. Pull this file from GitHub and attach it as VENDOR data (not user),
#      so Proxmox's Cloud-Init tab still handles user creation and SSH key injection:
#        wget -O /var/lib/vz/snippets/cloud-init.yaml \
#          https://raw.githubusercontent.com/camcast3/MinecraftInfra/main/infra/proxmox/cloud-init.yaml
#        qm set 100 --cicustom "vendor=local:snippets/cloud-init.yaml"
#
#   5. Start the VM: qm start 100
#
# After provisioning:
#   - SSH in via Proxmox console or LAN: ssh mcsvc@<vm-ip>
#   - Run: sudo tailscale up --ssh --authkey=<key-from-tailscale-admin>
#   - Note the Tailscale IP (100.x.x.x) — add it to Key Vault:
#       az keyvault secret set --vault-name kv-minecraft-prod \
#         --name c2e2-tailscale-ip --value '100.x.x.x'
#   - Add the VM as an environment in your main Portainer instance using the Edge Agent:
#       In main Portainer → Environments → Add → Docker Standalone → Edge Agent Standard
#       Run the generated docker run command on this VM to register it
#   - Deploy the C2E2 stack from main Portainer pointing to docker/proxmox/docker-compose.yml
#     and configure all required environment variables (see docker/proxmox/docker-compose.yml)

package_update: true
package_upgrade: true

packages:
  - curl
  - git
  - ufw
  - unattended-upgrades
  - apt-listchanges
  - gettext-base
  - ca-certificates
  - gnupg
  - qemu-guest-agent

write_files:
  # Daily security patches, auto-reboot at 03:00 (off-peak)
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

  - path: /etc/apt/apt.conf.d/51unattended-upgrades-minecraft
    content: |
      Unattended-Upgrade::Automatic-Reboot "true";
      Unattended-Upgrade::Automatic-Reboot-Time "03:00";

  # Load tun kernel module on boot — required by the Tailscale Docker sidecar
  # (TS_USERSPACE=false mounts /dev/net/tun inside the container)
  - path: /etc/modules-load.d/tun.conf
    content: |
      tun

runcmd:
  # QEMU Guest Agent — enables graceful Proxmox shutdown, IP reporting, and consistent snapshots
  - systemctl enable --now qemu-guest-agent

  # Install Docker CE (official repo, not distro package)
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update -qq
  - apt-get install -y -qq docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable --now docker

  # Install Tailscale (for host-level admin SSH — separate from the Docker sidecar)
  - curl -fsSL https://tailscale.com/install.sh | sh
  # tailscale up is intentionally NOT run here — run manually after boot:
  #   sudo tailscale up --ssh --authkey=tskey-auth-...

  # Create bind-mount directories for the Docker stack
  - mkdir -p /data/minecraft/tailscale
  - mkdir -p /data/minecraft/c2e2

  # mcsvc is NOT in the docker group — docker group = root equivalent.
  # Grant sudo only for specific docker/systemctl commands needed for MC ops.
  - |
    cat > /etc/sudoers.d/mcsvc-docker << 'EOF'
    mcsvc ALL=(root) NOPASSWD: /usr/bin/docker, /usr/bin/docker compose, /usr/bin/systemctl status docker, /usr/bin/systemctl restart docker
    EOF
  - chmod 440 /etc/sudoers.d/mcsvc-docker

  # Ensure SSH authorized_keys for mcsvc has correct permissions.
  # Proxmox injects the key via cloud-init metadata; this guarantees correct
  # ownership and permissions regardless of how the key was applied.
  - mkdir -p /home/mcsvc/.ssh
  - chmod 700 /home/mcsvc/.ssh
  - touch /home/mcsvc/.ssh/authorized_keys
  - chmod 600 /home/mcsvc/.ssh/authorized_keys
  - chown -R mcsvc:mcsvc /home/mcsvc/.ssh

  # Move SSH to port 7822 — avoids automated port scanners and limits exposure
  # if the Azure VM (on the same TailScale network) were ever compromised.
  - sed -i 's/^#\?Port .*/Port 7822/' /etc/ssh/sshd_config
  - grep -q '^Port 7822' /etc/ssh/sshd_config || echo 'Port 7822' >> /etc/ssh/sshd_config
  - systemctl restart ssh

  # UFW: deny all inbound, allow all outbound.
  #
  # WHY no TailScale or Minecraft port rules are needed:
  #   TailScale runs as a Docker sidecar container (not on the host). The container
  #   establishes outbound UDP tunnels to DERP relay servers and peers. Docker's NAT
  #   (MASQUERADE) tracks these as RELATED/ESTABLISHED so return traffic passes
  #   UFW's before.rules automatically — no inbound rule required.
  #
  #   Velocity (Azure VM) connects to C2E2 via the TailScale tunnel IP (100.x.x.x:25565).
  #   That traffic travels INSIDE the encrypted TailScale tunnel, decrypted by the
  #   container, and delivered to C2E2 via the shared network namespace — it never
  #   arrives as a new raw TCP/UDP connection on the host's interface.
  #
  #   DO NOT add 'ufw allow in on tailscale0' — tailscale0 is inside the container,
  #   not on the host. A blanket tailscale0 host rule would be meaningless here and
  #   could allow lateral movement if host-level Tailscale were ever enabled.
  #
  #   Portainer Edge Agent makes outbound-only connections to the main Portainer
  #   tunnel port — no inbound port is needed on this host.
  #
  # The only inbound traffic needed is SSH from the LAN subnet.
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow from 192.168.86.0/24 to any port 7822 proto tcp comment 'SSH from LAN only'
  - ufw --force enable

  # Portainer is NOT installed here. The VM is managed by connecting it to a main
  # Portainer instance via the Edge Agent (see post-provisioning steps above).
