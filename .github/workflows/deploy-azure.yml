name: Deploy Azure VM & Stack

on:
  push:
    branches: [main]
    paths:
      - 'infra/azure/**'
      - 'docker/azure/**'
      - 'docker/shared/**'
      - '.github/workflows/deploy-azure.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch to deploy (default: main)'
        required: false
        default: 'main'
        type: string

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 2   # needed for git diff HEAD~1

      # Log in to Azure via OIDC — no stored credentials, token is short-lived
      # Docs: https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure-openid-connect
      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group (idempotent)
        run: |
          az group create \
            --name rg-minecraft-prod \
            --location westus \
            --tags environment=prod

      # Only redeploy Bicep when infra files changed or the workflow was triggered manually.
      # osProfile.customData is immutable on existing VMs — Bicep would fail if we always
      # redeployed and vm.bicep changed. Docker-only pushes skip this step entirely.
      - name: Check if infra changed
        id: infra_check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^infra/azure/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Bicep (infra + VM)
        if: steps.infra_check.outputs.changed == 'true' || (github.event_name == 'workflow_dispatch' && (inputs.ref == 'main' || inputs.ref == ''))
        run: |
          az deployment group create \
            --resource-group rg-minecraft-prod \
            --template-file infra/azure/main.bicep \
            --parameters infra/azure/parameters/prod.bicepparam

      # Pull latest images and restart the Azure stack.
      # Uses az vm run-command so no SSH key or Tailscale tunnel is needed —
      # the runner's OIDC Azure session (Contributor on the RG) is sufficient.
      # Commands run as root on the VM; refresh-env.sh re-fetches KV secrets
      # and rewrites /opt/minecraft/secrets/* + velocity.toml before the
      # compose restart.
      - name: Resolve deploy ref
        id: ref
        run: echo "branch=${{ inputs.ref || 'main' }}" >> "$GITHUB_OUTPUT"

      - name: Deploy Docker stack
        run: |
          az vm run-command invoke \
            --resource-group rg-minecraft-prod \
            --name vm-minecraft-prod \
            --command-id RunShellScript \
            --scripts "
              export HOME=/root
              set -euo pipefail
              # /opt/minecraft is owned by the admin user; this script runs as
              # root via Azure run-command. --system writes /etc/gitconfig and
              # doesn't depend on \$HOME.
              git config --system --add safe.directory /opt/minecraft
              cd /opt/minecraft
              git fetch origin
              git checkout ${{ steps.ref.outputs.branch }}
              git reset --hard origin/${{ steps.ref.outputs.branch }}
              bash docker/azure/refresh-env.sh
              docker compose -f docker/azure/docker-compose.yml pull
              docker compose -f docker/azure/docker-compose.yml up -d --remove-orphans
            " \
            --output json | jq -r '.value[0].message'
