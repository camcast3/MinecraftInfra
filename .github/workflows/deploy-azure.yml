name: Deploy Azure VM & Stack

on:
  push:
    branches: [main]
    paths:
      - 'infra/azure/**'
      - 'docker/azure/**'
      - 'docker/shared/**'
      - '.github/workflows/deploy-azure.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch to deploy (default: main)'
        required: false
        default: 'main'
        type: string

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 2   # needed for git diff HEAD~1

      # Log in to Azure via OIDC — no stored credentials, token is short-lived
      # Docs: https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure-openid-connect
      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group (idempotent)
        run: |
          az group create \
            --name rg-minecraft-prod \
            --location westus \
            --tags environment=prod

      # Only redeploy Bicep when infra files changed or the workflow was triggered manually.
      # osProfile.customData is immutable on existing VMs — Bicep would fail if we always
      # redeployed and vm.bicep changed. Docker-only pushes skip this step entirely.
      - name: Check if infra changed
        id: infra_check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^infra/azure/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Bicep (infra + VM)
        if: steps.infra_check.outputs.changed == 'true' || (github.event_name == 'workflow_dispatch' && (inputs.ref == 'main' || inputs.ref == ''))
        run: |
          az deployment group create \
            --resource-group rg-minecraft-prod \
            --template-file infra/azure/main.bicep \
            --parameters infra/azure/parameters/prod.bicepparam

      # Pull latest images and restart the Azure stack.
      # Uses az vm run-command so no SSH key or Tailscale tunnel is needed —
      # the runner's OIDC Azure session (Contributor on the RG) is sufficient.
      # Commands run as root on the VM; refresh-env.sh re-fetches KV secrets
      # and rewrites /opt/minecraft/secrets/* + velocity.toml before the
      # compose restart.
      #
      # Security: the deploy ref MUST NOT be interpolated into the inline
      # script via `${{ ... }}`. workflow_dispatch.inputs.ref is attacker-
      # controlled by anyone with write access (and that's a defense-in-depth
      # boundary worth holding). Strategy:
      #   1) Pull inputs.ref into an env var so it's a shell string, not a
      #      template substitution.
      #   2) Validate it against a strict allowlist on the runner BEFORE
      #      sending it to the VM. Reject anything outside [a-zA-Z0-9._/-].
      #   3) Pass it via `--parameters` (Azure surfaces this as a positional
      #      arg `$1` to the script). Inside the script body, single-quote
      #      the heredoc so the runner shell can't expand anything, and
      #      reference `$1` with proper double-quoting.
      - name: Deploy Docker stack
        env:
          DEPLOY_REF: ${{ inputs.ref || 'main' }}
        run: |
          case "$DEPLOY_REF" in
            "" | *[!a-zA-Z0-9._/-]*)
              echo "Refusing to deploy ref with unsafe characters or empty value: '$DEPLOY_REF'" >&2
              exit 1
              ;;
          esac
          az vm run-command invoke \
            --resource-group rg-minecraft-prod \
            --name vm-minecraft-prod \
            --command-id RunShellScript \
            --parameters "deployRef=$DEPLOY_REF" \
            --scripts '
              export HOME=/root
              set -euo pipefail
              # az vm run-command passes --parameters as positional args to
              # the script ($1, $2, ...). Strip the "deployRef=" prefix with
              # bash parameter expansion (no eval, no command substitution).
              REF="${1#deployRef=}"
              if [ -z "$REF" ]; then
                echo "Empty deploy ref received on VM — aborting" >&2
                exit 1
              fi
              # /opt/minecraft is owned by the admin user; this script runs
              # as root via Azure run-command. --system writes /etc/gitconfig
              # and doesnt depend on $HOME.
              git config --system --add safe.directory /opt/minecraft
              cd /opt/minecraft
              git fetch origin "$REF"
              git checkout "$REF"
              git reset --hard "origin/$REF"
              bash docker/azure/refresh-env.sh
              docker compose -f docker/azure/docker-compose.yml pull
              docker compose -f docker/azure/docker-compose.yml up -d --remove-orphans
              # ── Status-page stack (docker/azure/status/) ──────────────────
              # Independent of the proxy stack above — its compose project,
              # docker network, bind mounts, and secrets are all separate. A
              # failure here MUST NOT roll back the proxy stack deploy.
              #
              # The "all four cloudflare_* files present" check is set by
              # refresh-env.sh: it writes all four on success or removes any
              # stale ones on the all-or-nothing branch. So this conditional
              # is the authoritative gate for whether the status stack should
              # exist at all on this VM.
              STATUS_COMPOSE="docker/azure/status/docker-compose.yml"
              if [ -f /opt/minecraft/secrets/cloudflare_tunnel_token ] \
                  && [ -f /opt/minecraft/secrets/cloudflare_api_token ] \
                  && [ -f /opt/minecraft/secrets/cloudflare_account_id ] \
                  && [ -f /opt/minecraft/secrets/cloudflare_list_id ]; then
                echo "▶ status stack: all CF secrets present, deploying"
                docker compose -f "$STATUS_COMPOSE" pull || \
                  echo "⚠ status stack: pull failed, continuing with cached images"
                if ! docker compose -f "$STATUS_COMPOSE" up -d --remove-orphans; then
                  echo "✗ status stack: docker compose up failed — proxy stack already deployed, continuing"
                fi
              else
                echo "▶ status stack: CF secrets missing from KV — skipping deploy"
                echo "  See docs/operations/status-page-setup.md for one-time setup"
                # If the stack is currently running but secrets were intentionally
                # removed from KV (e.g. operator pausing the status page),
                # `down` stops it gracefully. `|| true` because the stack may
                # have never been created — that is the common case.
                docker compose -f "$STATUS_COMPOSE" down --remove-orphans || true
              fi
            ' \
            --output json | jq -r '.value[0].message'
