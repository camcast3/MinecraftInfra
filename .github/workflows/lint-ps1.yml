---
name: Lint PowerShell scripts

# Guards against UTF-8 BOMs being reintroduced on .ps1 files.
# A leading BOM breaks the `irm <url> | iex` install pattern used by
# docs/assets/setup.ps1: irm decodes the response to a string with a
# literal U+FEFF prefix and iex then tries to execute "<U+FEFF>#" as a
# command. Scripts invoked via `powershell.exe -File` (update.ps1,
# backup.ps1) don't trip on this today, but all .ps1s are guarded
# uniformly so a future refactor can't silently reintroduce the bug.

on:
  pull_request:
    paths:
      - "**/*.ps1"
      - ".github/workflows/lint-ps1.yml"
  push:
    branches: [main]
    paths:
      - "**/*.ps1"
      - ".github/workflows/lint-ps1.yml"

permissions:
  contents: read

jobs:
  no-bom:
    name: No UTF-8 BOM in .ps1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # old/ is archived (see .github/copilot-instructions.md) and
      # intentionally excluded.
      - name: Fail on any .ps1 starting with UTF-8 BOM
        run: |
          set -euo pipefail
          bad=()
          while IFS= read -r f; do
            prefix=$(head -c 3 -- "$f" | od -An -tx1 | tr -d ' \n')
            if [ "$prefix" = "efbbbf" ]; then
              bad+=("$f")
            fi
          done < <(git ls-files -- '*.ps1' ':!old/**')
          if [ ${#bad[@]} -gt 0 ]; then
            printf 'PS1 files with UTF-8 BOM (must be removed):\n'
            printf '  %s\n' "${bad[@]}"
            printf '\nFix on Windows PowerShell:\n'
            printf '  $b = [IO.File]::ReadAllBytes($path)\n'
            printf '  [IO.File]::WriteAllBytes($path, $b[3..($b.Length-1)])\n'
            exit 1
          fi
          printf 'No PS1 files contain a UTF-8 BOM.\n'
