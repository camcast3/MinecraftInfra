---
name: Release setup script

# Triggers when you push a tag like `setup-v0.1.0`.
# Bundles docs/assets/setup.ps1 as a GitHub Release asset and publishes the
# SHA-256 in the release notes so players can verify before running.
#
# To cut a release:
#   git tag setup-v0.1.0
#   git push origin setup-v0.1.0

on:
  push:
    tags:
      - "setup-v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute SHA-256
        id: hash
        run: |
          sha=$(sha256sum docs/assets/setup.ps1 | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Setup script ${{ github.ref_name }}"
          files: docs/assets/setup.ps1
          body: |
            Player onboarding script for the NegativeZone Minecraft server.

            ## Install command

            ```powershell
            irm https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/setup.ps1 | iex
            ```

            ## SHA-256

            ```
            ${{ steps.hash.outputs.sha256 }}
            ```

            ## Verify before running (optional, recommended)

            ```powershell
            $url  = 'https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/setup.ps1'
            $want = '${{ steps.hash.outputs.sha256 }}'
            $body = irm $url
            $got  = (Get-FileHash -InputStream ([IO.MemoryStream]::new([Text.Encoding]::UTF8.GetBytes($body))) -Algorithm SHA256).Hash.ToLower()
            if ($got -eq $want) { iex $body } else { throw "SHA-256 mismatch: $got vs $want" }
            ```
