---
name: Publish Prism Pack

# Forever-loop prevention: this workflow modifies docker-compose.yml +
# modpack.yml and opens an auto-merging PR. Triggers are an exhaustive
# allow-list — `push: branches: [main]`, `push: paths: [docker/proxmox/**]`,
# `push: paths: [modpack.yml]`, and `pull_request` are FORBIDDEN (each would
# re-fire on every publish PR merge). Adding any trigger requires re-doing
# this analysis.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic-ish version (no v prefix), e.g. 0.3.1 or 2026.06.13'
        required: true
        type: string
  push:
    tags:
      - 'modpack/v*'

# Serialize: two admins racing must not double-publish. cancel-in-progress:
# false because killing mid-publish leaves partial state (blob uploaded but
# no PR, compose rewritten but not pushed).
concurrency:
  group: publish-prism-pack
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Same environment as deploy-azure.yml for a single approval surface
    # and to scope the federated credential to publish identity.
    environment: production

    steps:
      - name: Resolve and validate version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_EVENT_NAME -eq 'push') {
            $version = $env:GITHUB_REF_NAME -replace '^modpack/v', ''
          } else {
            $version = '${{ inputs.version }}'
          }
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Could not resolve a version from the trigger."
          }
          # Restrict to chars safe in branch/tag names, blob filenames, and JSON.
          if ($version -notmatch '^[A-Za-z0-9.+_-]+$') {
            throw "Version '$version' contains characters that aren't safe for branch / tag / filenames."
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Resolved publish version: $version"

      - name: Checkout main
        # ref: main is critical — the publish script reads `git rev-parse HEAD`
        # after `git checkout -B publishBranch origin/main` for the SHA pin.
        # fetch-depth: 0 so git log / branch ops have full history.
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: No-op short-circuit (version already published)
        id: noop_check
        shell: pwsh
        run: |
          $modpackMatch = Select-String -Path 'modpack.yml' -Pattern '^version:\s*"(.+)"\s*$'
          if (-not $modpackMatch) {
            throw "Could not parse 'version: ""...""' line in modpack.yml."
          }
          $current = $modpackMatch.Matches[0].Groups[1].Value
          $requested = '${{ steps.version.outputs.version }}'
          Write-Host "modpack.yml currently at: $current"
          Write-Host "Requested:                $requested"
          if ($current -eq $requested) {
            $summary = @"
          ## No-op publish

          ``modpack.yml`` is already pinned to ``$current`` — nothing to do.

          The workflow exited **before any side effects**: no blob upload, no
          ``docker/proxmox/docker-compose.yml`` rewrite, no PR opened, no
          ``modpack/v$current`` branch pushed.

          If you intended to re-publish (e.g. blob corrupt, need to rotate
          the SHA pin to a newer ``packwiz/`` commit), bump the version
          input — or run ``publish-prism-pack.ps1 -Version $current -Force``
          locally if you really need to overwrite the existing branch.
          "@
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary
            Write-Host "::notice::Requested version matches modpack.yml; exiting without side effects."
            "noop=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 0
          }
          "noop=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # Defensive: actions/checkout produces a clean tree, so a dirty
      # packwiz/ here means a hook or self-hosted-runner misconfiguration.
      # Fail loud rather than producing a SHA-pin that mismatches the zip.
      - name: Verify clean packwiz/ tree
        if: steps.noop_check.outputs.noop != 'true'
        run: git diff --exit-code HEAD -- packwiz/

      - name: Configure git identity for publish commit
        if: steps.noop_check.outputs.noop != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Go (for packwiz CLI)
        if: steps.noop_check.outputs.noop != 'true'
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      - name: Install packwiz CLI
        if: steps.noop_check.outputs.noop != 'true'
        run: |
          go install github.com/packwiz/packwiz@latest
          packwiz --version

      - name: Set up Java (for packwiz-installer-bootstrap)
        if: steps.noop_check.outputs.noop != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache packwiz-installer-bootstrap.jar
        if: steps.noop_check.outputs.noop != 'true'
        uses: actions/cache@v5
        with:
          path: infra/azure/scripts/cache/
          # Bump this key when build-instance-from-packwiz.ps1's
          # $BootstrapVersion default changes (currently v0.0.3).
          key: pwiz-bootstrap-v0.0.3

      - name: Materialize staging instance from packwiz manifest
        if: steps.noop_check.outputs.noop != 'true'
        shell: pwsh
        run: ./infra/azure/scripts/build-instance-from-packwiz.ps1 -InstanceName "Craft to Exile 2"

      - name: Azure login (OIDC)
        if: steps.noop_check.outputs.noop != 'true'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Publish (zip + sha + blob upload + compose rewrite + git push + PR)
        if: steps.noop_check.outputs.noop != 'true'
        shell: pwsh
        env:
          # gh CLI reads GH_TOKEN; default GITHUB_TOKEN has pull-requests:
          # write per permissions block above.
          GH_TOKEN: ${{ github.token }}
        run: |
          # Auto-merge safety: publish-prism-pack.ps1 line 720 enables
          # `gh pr merge $prUrl --auto --squash --delete-branch`. Safe vs
          # forever-loop because `push: branches: [main]` is excluded from
          # this workflow's triggers — the merge commit can't re-fire publish.
          # Correctness-critical: latest.json (player auto-update target)
          # flips at the end of the script, so deferring merge would leave
          # the server on the old version while clients upgrade, breaking
          # joins until manual merge.
          ./infra/azure/scripts/publish-prism-pack.ps1 -Version '${{ steps.version.outputs.version }}'

      - name: Publish summary
        if: always() && steps.noop_check.outputs.noop != 'true'
        shell: pwsh
        run: |
          $status = if ('${{ job.status }}' -eq 'success') { '✅ Succeeded' } else { '❌ Failed' }
          $summary = @"
          ## Publish v${{ steps.version.outputs.version }} — $status

          - Triggered by: ``${{ github.event_name }}``
          - Triggering ref: ``${{ github.ref }}``
          - Run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          On success the script will have:

          - Uploaded the zip to the ``minecraft-modpack`` blob container.
          - Rewritten ``docker/proxmox/docker-compose.yml`` with the new SHA pin + MOTD.
          - Bumped ``modpack.yml``.
          - Opened the publish PR against ``main`` from branch ``modpack/v${{ steps.version.outputs.version }}``.
          - Portainer GitOps will redeploy C2E2 within ~5 min of PR merge.

          **Next step:** none — auto-merge is enabled on the publish PR
          (``gh pr merge --auto --squash --delete-branch``). It squash-merges
          as soon as required status checks pass and Portainer redeploys
          C2E2 within ~5 min of the merge landing on ``main``.
          "@
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary
