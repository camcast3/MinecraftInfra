# Proxy-Compatible-Forge (PCF) config
# The forwarding secret is injected at container startup via itzg's
# PATCH_DEFINITIONS feature (see docker/shared/patches/pcf-forwarding.json).
# REPLACE_ENV_VARIABLES does NOT process .toml files — PATCH_DEFINITIONS does.

[forwarding]
enabled = true
mode = "MODERN"
secret = ""
approvedProxyHosts = []

[crossStitch]
enabled = true
forceWrappedArguments = []
forceWrapVanillaArguments = false

[debug]
enabled = false
disabledMixins = []

[advanced]
modernForwardingVersion = "NO_OVERRIDE"
