---
# Local C2E2 dev stack — just enough to materialize the in-repo packwiz/
# manifest into a running Forge 1.20.1 server you can connect a client to.
#
#   packwiz-server (nginx) ── serves packwiz/ over HTTP on the bridge
#                             network so c2e2 can fetch pack.toml
#   c2e2           (Forge) ── boots, runs packwiz-installer against the
#                             sidecar's pack.toml, downloads ~390 mods
#                             on first run, then serves on :25565
#
# Usage:
#   cd docker/local
#   docker compose up                     # foreground; first run = 10-20 min
#   docker compose logs -f c2e2           # tail in another shell
#   docker compose down                   # stop; keeps the mods volume
#   docker compose down -v                # wipe the mods volume for a clean re-install
#
# Connect a Forge 1.20.1 + 47.4.10 client (e.g. your current Prism instance
# of the C2E2 modpack) to: localhost:25565
#
# ONLINE_MODE is FALSE — any client username works. The shared whitelist
# is mounted but not enforced (ENFORCE_WHITELIST=FALSE) so you don't need
# to add yourself.

services:

  packwiz-server:
    container_name: c2e2-packwiz-server
    image: nginx:1.27-alpine@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10
    networks:
      - c2e2
    restart: unless-stopped
    volumes:
      # Serve the LIVE in-repo packwiz/ directory. Edits to packwiz/ +
      # `packwiz refresh` are picked up on the next `docker compose
      # restart c2e2` (no rebuild, no git push).
      - ../../packwiz:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/pack.toml"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  c2e2:
    container_name: c2e2
    image: itzg/minecraft-server:2026.6.0-java17@sha256:3fb55b2c2bf1f5fcef9c2665f4844b654bf5e3207e7ed51fb0f5d7a420ef403b
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"
      # Prometheus exporter metrics endpoint (mod listens on :19565). Exposed
      # for parity with prod's MODS overlay validation — `curl localhost:19565`
      # should return Prometheus-format text after boot.
      - "19565:19565"
    networks:
      - c2e2
    depends_on:
      packwiz-server:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - c2e2-data:/data
      - ../shared/whitelist.json:/extras/whitelist.json:ro
      - ../shared/ops.json:/extras/ops.json:ro
    environment:
      EULA: "TRUE"
      TYPE: FORGE
      VERSION: "1.20.1"
      # Keep in sync with the `forge` value in packwiz/pack.toml's
      # [versions] block. The import script updates pack.toml + the
      # proxmox compose automatically; this line must be hand-bumped.
      FORGE_VERSION: "47.4.10"
      # Points at the sidecar's nginx — serves the LIVE in-repo packwiz/
      # dir, so uncommitted .pw.toml / `packwiz refresh` results are
      # live-testable.
      PACKWIZ_URL: "http://c2e2-packwiz-server/pack.toml"
      # Local stack runs the MODPACK from packwiz plus minecraft-prometheus-exporter
      # from the admin overlay (same URL the prod compose uses in its MODS: env),
      # so we can sanity-check the hybrid PACKWIZ_URL + MODS architecture against
      # the live packwiz manifest before prod adopts it. The other two prod admin
      # mods (PCF, spark) are deliberately OUT here: PCF would reject direct
      # localhost connections (no Velocity in front) and spark profiling adds
      # nothing to "does this work?" validation. To go fully prod-faithful copy
      # the rest of the prod compose's `MODS:`, `APPLY_EXTRA_FILES:`,
      # `PATCH_DEFINITIONS:`, and top-level `configs:` blocks, then add a local
      # PCF override TOML with `forwarding.enabled = false`.
      MODS: |-
        https://github.com/cpburnz/minecraft-prometheus-exporter/releases/download/1.20.1-forge-1.2.1/Prometheus-Exporter-1.20.1-forge-1.2.1.jar
      # Fetch the prom-exporter config from main HEAD on first run (--skip-existing
      # default, so re-runs don't clobber local edits). Pulls from the same
      # canonical source the prod compose uses, so any drift between local-test
      # and prod is impossible.
      APPLY_EXTRA_FILES: |-
        world/serverconfig<https://raw.githubusercontent.com/camcast3/MinecraftInfra/main/docker/shared/config/prometheus_exporter-server.toml
      MEMORY: ""
      JVM_XX_OPTS: "-XX:MaxRAMPercentage=75"
      ONLINE_MODE: "FALSE"
      ENABLE_ROLLING_LOGS: "true"
      MOTD: "Craft to Exile 2 (local)"
      # Local dev: whitelist entirely off. Any username can join (ONLINE_MODE
      # is FALSE so any username is accepted at auth too). Ops file still
      # mounted so admin commands work if you log in as one of them.
      WHITELIST: ""
      ENFORCE_WHITELIST: "FALSE"
      OPS_FILE: /extras/ops.json
    healthcheck:
      test: ["CMD", "mc-health"]
      interval: 30s
      timeout: 10s
      retries: 5
      # First boot: packwiz install (~5 min @ ~3-4 GB) + Forge load
      # (~5 min for the C2E2 mod set). 15 min covers a cold disk.
      start_period: 900s

volumes:
  c2e2-data:

networks:
  c2e2:
    driver: bridge
