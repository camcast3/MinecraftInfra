# Fail2Ban action that bans / unbans IPs by mutating a Cloudflare IP List
# via the CF REST API. The list is wired to a single CF Firewall Custom
# Rule (Block on list match) — so adding an IP to the list immediately
# blocks all traffic from that IP at Cloudflare's global edge, BEFORE it
# reaches the cloudflared tunnel.
#
# Why this instead of fail2ban's iptables-multiport action:
#   In a Cloudflare Tunnel topology, by the time fail2ban reads the access
#   log entry, the offending request has already completed (request → tunnel
#   → traefik → response → log line). An iptables rule on the origin would
#   only block follow-up requests AFTER they re-establish through CF, which
#   defeats the point — CF is the choke point. Banning at CF closes the
#   choke point for everything from that IP, regardless of whether they're
#   targeting the tunnel, the (non-existent) origin direct IP, etc.
#
# Helper script: /usr/local/lib/fail2ban-cf/cloudflare-ban-helper.py
#   Bind-mounted into the container from
#   docker/azure/status/fail2ban/scripts/. Uses Python stdlib only (urllib +
#   json) — no jq or curl dependency. Reads CF account_id / list_id /
#   api_token from /run/secrets/ files (docker compose secrets backed by
#   /opt/minecraft/secrets/* on the host, populated by refresh-env.sh from
#   Azure Key Vault).
#
# CF API token scope (least privilege):
#   Account: Account Filter Lists: Edit
#   Zone:    Zone: Read (so token validation passes; no zone mutation needed)
#   Restricted to the negativezone.cc zone + the single status-page account.

[Definition]

# fail2ban substitutions:
#   <ip>   — the offending IPv4/IPv6 (without subnet)
#   <name> — the jail name, used as the CF list-item comment for traceability

actionstart =
actionstop =
actioncheck =

# Invoke via `python3 <path>` rather than direct script execution. The
# helper script is bind-mounted from the repo and we don't want to depend
# on the +x bit surviving across Windows / Linux git clones (the repo is
# multi-platform). crazymax/fail2ban includes python3 in its base image.
actionban = python3 /usr/local/lib/fail2ban-cf/cloudflare-ban-helper.py add <ip> "fail2ban:<name>"

actionunban = python3 /usr/local/lib/fail2ban-cf/cloudflare-ban-helper.py remove <ip>

[Init]
