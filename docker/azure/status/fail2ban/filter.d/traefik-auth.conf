# 401/403 brute-force detection on the Kuma admin path.
#
# Used by the traefik-auth-bruteforce jail with maxretry=5/findtime=10m.
# Real operator login failures should be ≤ a couple within 10 minutes; a
# brute-force script can produce thousands per minute, so 5 is a generous
# threshold that still catches anyone trying.
#
# Scoped to /api/login and /dashboard paths — public Kuma status page reads
# return 200/304/websocket, so a 401/403 there is the operator (or someone
# trying to be the operator). 401 = wrong password, 403 = rate-limited
# inside Kuma. We treat both as "tried to authenticate and failed".

[Definition]

failregex = ^\s*\{.*?"ClientHost":"<HOST>".*?"RequestPath":"/(api/(login|2fa|status-page)|dashboard)[^"]*".*?"OriginStatus":(401|403)[,}].*$

ignoreregex =

datepattern = {^LN-BEG}%%Y-%%m-%%dT%%H:%%M:%%S(?:\.\d+)?(?:Z|[+-]\d{2}:?\d{2})
