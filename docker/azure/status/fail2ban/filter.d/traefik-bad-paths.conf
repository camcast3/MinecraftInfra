# Instant-ban filter for requests to paths with zero legitimate use on a
# Minecraft status page. Used by the traefik-bad-paths jail with maxretry=1,
# so a single hit triggers the ban.
#
# The path list is the well-known "first 10 minutes of internet exposure"
# scanner inventory — WordPress, phpMyAdmin, Spring Actuator, AWS metadata
# endpoints, git/env exfiltration, etc. None of these can ever be served by
# Uptime Kuma; if anyone requests them, they're scanning.
#
# Match status is INTENTIONALLY ANY status code — a 404 here is just as
# diagnostic as a 200 (a 200 would mean someone misconfigured a route).

[Definition]

failregex = ^\s*\{.*?"ClientHost":"<HOST>".*?"RequestPath":"/?[^"]*?(\.env|wp-login\.php|wp-admin|xmlrpc\.php|phpmyadmin|/phpMyAdmin|adminer\.php|/manager/html|/cgi-bin/|owa/|\.git/config|\.git/HEAD|\.aws/credentials|\.ssh/id_rsa|/jolokia|/actuator(/|"|$)|/_profiler|/server-status|/server-info|/\.well-known/security|/console\.php|/login\.action|/struts|/HNAP1|/boaform|/goform|/setup\.cgi|/shell\?|/api/v1/namespaces)[^"]*?"[,}].*$

ignoreregex =

datepattern = {^LN-BEG}%%Y-%%m-%%dT%%H:%%M:%%S(?:\.\d+)?(?:Z|[+-]\d{2}:?\d{2})
