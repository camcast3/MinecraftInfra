# Generic 4xx scraper / scanner detection — fires on ANY 4xx response.
#
# Used by the traefik-4xx-spam jail with maxretry=50/findtime=5m, so a single
# 404 doesn't ban anyone — a sustained pattern of 4xx responses (typical of
# automated scanners walking common paths) does.
#
# Format: matches one JSON object per line. Traefik writes one such object
# per request with the access log "json" formatter. Key fields:
#   ClientHost   — real client IP (X-Forwarded-For from cloudflared, trusted
#                  via traefik.yml's forwardedHeaders.trustedIPs subnet)
#   OriginStatus — backend response status code (3-digit integer)
#
# Note: regex anchored to `,` boundaries so we don't accidentally match a
# 4xx that appears inside a header value or User-Agent string.

[Definition]

failregex = ^\s*\{.*?"ClientHost":"<HOST>".*?"OriginStatus":4\d{2}[,}].*$

ignoreregex =

# Tell fail2ban the log is line-oriented JSON; default datepattern matches
# Traefik's RFC3339 "time" field automatically.
datepattern = {^LN-BEG}%%Y-%%m-%%dT%%H:%%M:%%S(?:\.\d+)?(?:Z|[+-]\d{2}:?\d{2})
