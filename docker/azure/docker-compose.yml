---
# Azure stack: Velocity proxy only
# Managed by GitHub Actions (deploy-azure.yml).
#
# The Azure VM is purely the public entry point and Mojang-auth gateway.
# Players connect to mc.negativezone.cc:25565 → Velocity → Craft to Exile 2
# on the Proxmox VM over Tailscale. No backend MC server runs here.
#
# Environment variables come from /opt/minecraft/docker/azure/.env
# written by the deploy workflow from Azure Key Vault secrets.
#
# Bind mounts live under /data/minecraft/ (64 GB Premium SSD mounted by cloud-init).
# Config files (velocity.toml, forwarding.secret) are written by the deploy workflow
# to /data/minecraft/velocity/ before docker compose up runs.
#
# MC 1.20.1 requires Java 17 — the Velocity image is pinned to a Java 17 variant
# because Velocity 3.4+ (Java 21 only) drops support for 1.20.1 Forge backends.
#
# Key Vault secrets written to .env by deploy-azure.yml:
#   VELOCITY_FORWARDING_SECRET  — shared secret between Velocity and the C2E2 backend
#   C2E2_TAILSCALE_IP           — TailScale IP of the Proxmox VM (used in velocity.toml)

x-common-keys-apps: &common-keys-apps
  security_opt:
    - no-new-privileges:true
  restart: unless-stopped

services:

  ############################# PROXY
  velocity:
    <<: *common-keys-apps
    container_name: velocity
    # mc-proxy java17 — stays on Java 17 to be compatible with 1.20.1 backends
    image: itzg/mc-proxy:java17-2025.10.0@sha256:7043620f1ac866e86fee922c1c22a035800db95c2fe511778de4f22ac19e9f19
    ports:
      - "25565:25577"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    volumes:
      # velocity.toml and forwarding.secret written here by deploy-azure.yml before compose up
      - /data/minecraft/velocity:/server
    environment:
      TYPE: VELOCITY
      # 3.3.0-SNAPSHOT is the last Velocity release supporting Java 17 (3.4+ requires Java 21).
      # Pinned here so the itzg image doesn't auto-download a newer incompatible build.
      VELOCITY_VERSION: "3.3.0-SNAPSHOT"
      # Ambassador — required for Forge 1.13-1.20.1 behind Velocity.
      # Handles Forge channel negotiation that vanilla Velocity can't.
      PLUGINS: "https://github.com/adde0109/Ambassador/releases/download/v1.4.5/Ambassador-Velocity-1.4.5-all.jar"
      # forwarding.secret is pre-written by refresh-env.sh; this env var is a
      # belt-and-suspenders fallback for the itzg image's own secret generation.
      VELOCITY_FORWARDING_SECRET: ${VELOCITY_FORWARDING_SECRET}
    healthcheck:
      test: ["CMD", "mc-monitor", "status", "--host", "localhost", "--port", "25577"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
