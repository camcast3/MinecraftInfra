---
# Azure stack: Velocity proxy + Forge 1.20.1 lobby + Azure Blob backup
# Managed by GitHub Actions (deploy-azure.yml).
#
# Environment variables come from /opt/minecraft/docker/azure/.env
# written by the deploy workflow from Azure Key Vault secrets.
#
# Bind mounts live under /data/minecraft/ (64 GB Premium SSD mounted by cloud-init).
# Config files (velocity.toml, forwarding.secret) are written by the deploy workflow
# to /data/minecraft/velocity/ before docker compose up runs.
#
# MC 1.20.1 requires Java 17 — all server images MUST use java17 variants.
#
# Backup uses rclone configured entirely via env vars (no rclone.conf needed).
# RCLONE_CONFIG_<REMOTE>_<KEY> creates an in-memory remote at rclone startup.
# The VM's system-assigned Managed Identity is used via env_auth — rclone falls
# through to MSI automatically when no AZURE_* credential env vars are present.
#
# Required Azure resources (one-time setup):
#   az storage account create --name <account> --resource-group rg-minecraft-prod \
#     --sku Standard_LRS --kind StorageV2
#   az storage container create --name minecraft-backups --account-name <account>
#   az role assignment create --assignee <vm-principal-id> \
#     --role "Storage Blob Data Contributor" \
#     --scope "/subscriptions/.../storageAccounts/<account>/blobServices/default/containers/minecraft-backups"
#
# Key Vault secrets written to .env by deploy-azure.yml:
#   VELOCITY_FORWARDING_SECRET  — shared secret between Velocity and backend servers
#   RCON_PASSWORD               — RCON password for the lobby server
#   C2E2_TAILSCALE_IP           — TailScale IP of the Proxmox VM (used in velocity.toml)
#   STORAGE_ACCOUNT             — Azure Storage account name (no .blob.core.windows.net)

x-common-keys-apps: &common-keys-apps
  security_opt:
    - no-new-privileges:true
  restart: unless-stopped

services:

  ############################# PROXY
  velocity:
    <<: *common-keys-apps
    container_name: velocity
    # mc-proxy java17 — stays on Java 17 to be compatible with 1.20.1 backends
    image: itzg/mc-proxy:java17-2025.10.0@sha256:7043620f1ac866e86fee922c1c22a035800db95c2fe511778de4f22ac19e9f19
    ports:
      - "25565:25577"
    networks:
      - minecraft
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    volumes:
      # velocity.toml and forwarding.secret written here by deploy-azure.yml before compose up
      - /data/minecraft/velocity:/server
    environment:
      TYPE: VELOCITY
    healthcheck:
      test: ["CMD", "mc-monitor", "status", "--host", "localhost", "--port", "25577"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  ############################# MINECRAFT SERVERS
  lobby:
    <<: *common-keys-apps
    container_name: lobby
    # MC 1.20.1 requires Java 17 — NEVER change this to a java21 image variant
    image: itzg/minecraft-server:2026.5.4-java17@sha256:cee7b7204d8dcb9e6b4090fcbf4cecb2464bb5fff87027efec152909d16ca34a
    tty: true
    stdin_open: true
    networks:
      - minecraft
    depends_on:
      velocity:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 6G
    volumes:
      - /data/minecraft/lobby:/data
    environment:
      EULA: "TRUE"
      TYPE: FORGE
      VERSION: "1.20.1"
      # MEMORY="" disables itzg's built-in -Xms/-Xmx flags.
      # MaxRAMPercentage=75 derives heap dynamically from the 6G cgroup limit (~4.5 GB heap).
      MEMORY: ""
      JVM_XX_OPTS: "-XX:MaxRAMPercentage=75"
      ONLINE_MODE: "FALSE"
      ENABLE_ROLLING_LOGS: "true"
      MODE: adventure
      MAX_PLAYERS: 6
      ENABLE_RCON: "true"
      RCON_PORT: "25575"
      RCON_PASSWORD: ${RCON_PASSWORD}
      VELOCITY_FORWARDING_SECRET: ${VELOCITY_FORWARDING_SECRET}
    healthcheck:
      test: ["CMD", "mc-health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  ############################# MAINTENANCE
  backup:
    <<: *common-keys-apps
    container_name: mc-lobby-backup
    image: itzg/mc-backup:2026.5.1@sha256:32644da0332dbccfb47465044e7d34c733749aa2254fc3063d38186838b603b9
    networks:
      - minecraft
    depends_on:
      lobby:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    volumes:
      - /data/minecraft/lobby:/data:ro
    environment:
      RCON_HOST: lobby
      RCON_PORT: "25575"
      RCON_PASSWORD: ${RCON_PASSWORD}
      BACKUP_INTERVAL: "12h"
      PRUNE_BACKUPS_DAYS: "14"

      # ── rclone remote defined entirely via env vars (no rclone.conf needed) ──────
      # RCLONE_CONFIG_<REMOTE>_<KEY> creates the remote in memory at rclone startup.
      # Remote name "AZBLOB" matches the RCLONE_CONFIG_AZBLOB_* prefix below.
      BACKUP_METHOD: rclone
      RCLONE_REMOTE: AZBLOB
      # Path on the remote: <blob-container>/<subdirectory>
      # "minecraft-backups" is the blob container; "lobby" is the path within it.
      RCLONE_DEST_DIR: minecraft-backups/lobby

      # Remote type
      RCLONE_CONFIG_AZBLOB_TYPE: azureblob
      # Storage account name (no .blob.core.windows.net suffix)
      RCLONE_CONFIG_AZBLOB_ACCOUNT: ${STORAGE_ACCOUNT}
      # env_auth=true: rclone checks env vars → MSI → Azure CLI in order.
      # On this VM the system-assigned Managed Identity is picked up automatically.
      RCLONE_CONFIG_AZBLOB_ENV_AUTH: "true"

networks:
  minecraft:
    driver: bridge
