---
# Azure stack: Tailscale sidecar + Velocity proxy + monitoring sidecars
# Managed by GitHub Actions (deploy-azure.yml).
#
# The Azure VM is purely the public entry point and Mojang-auth gateway.
# Players connect to mc.negativezone.cc:25565 → Velocity → Craft to Exile 2
# on the Proxmox VM over Tailscale. No backend MC server runs here.
#
# Tailscale runs as a Docker sidecar (NOT on the host). The tailscale container
# owns the network namespace; Velocity, mc-monitor-exporter, and every monitoring
# sidecar share it via `network_mode: service:tailscale`. This mirrors the Proxmox
# stack pattern and keeps tailnet identity portable across host rebuilds.
#
# Why the tailscale service publishes `25565:25577` on the host:
#   The Azure VM IS the public ingress. Player traffic arrives at the host's
#   public IP on 25565 and must reach Velocity inside the sidecar's netns.
#   Publishing 25565 on the tailscale container DNATs host:25565 → netns:25577
#   where Velocity listens. Velocity's outbound to the C2E2 backend uses the
#   tailnet interface in the same netns. Single hop, no userland proxy.
#
# Metrics endpoints (8081/9080/9100/9985) are NOT published on the host.
# They're reachable only at the proxy VM's tailnet IP (100.x.x.x), which is
# the same trade-off the Proxmox stack accepts (cleaner exposure surface).
#
# Secrets are fetched from Azure Key Vault and written to /opt/minecraft/secrets/
# on the host by the deploy workflow's refresh-env.sh — never to a .env file.
# See the top-level `secrets:` block at the bottom of this file.
#
# Bind mounts live under /data/minecraft/ (64 GB Premium SSD mounted by cloud-init).
# Pre-create on the host (cloud-init does this for fresh provisioning):
#   mkdir -p /data/minecraft/{velocity,promtail}
#   install -d -m 0700 -o root -g root /data/minecraft/tailscale
#   install -d -m 0700 -o root -g root /opt/minecraft/secrets
#
# Tailscale's tun device is preloaded by /etc/modules-load.d/tun.conf and used
# with default 0600 root:root perms — the sidecar runs as root in its userns
# (see the service block below for the capability-set rationale).
#
# MC 1.20.1 requires Java 17 — the Velocity image is pinned to a Java 17 variant
# because Velocity 3.4+ (Java 21 only) drops support for 1.20.1 Forge backends.
#
# Secrets are written by refresh-env.sh from Azure Key Vault and reach
# containers via two paths:
#   - tailscale: docker compose `secrets:` from /opt/minecraft/secrets/ts_authkey.
#     The on-disk value is the live auth key only at first registration;
#     refresh-env.sh detects tailscaled.state and replaces it with a dead
#     placeholder afterward, so a compromised container can't exfiltrate it.
#   - velocity: refresh-env.sh writes forwarding.secret directly into
#     /data/minecraft/velocity/. A single-file bind onto /server/forwarding.secret
#     would be shadowed by the broader /data/minecraft/velocity:/server bind —
#     see the velocity volumes block for the postmortem.
# No secret value is ever written to .env, a Compose env var, or an image layer.

x-common-keys-apps: &common-keys-apps
  security_opt:
    - no-new-privileges:true
  restart: unless-stopped

services:

  ############################# NETWORK SIDECAR
  # Owns the network namespace shared by velocity + monitoring containers.
  # Publishes only the Minecraft player port on the host — everything else
  # (metrics endpoints) is reachable solely via the tailnet.
  #
  # Hardening (vs the Docker default of root + ~14 caps):
  #   - cap_drop: ALL + cap_add: NET_ADMIN — explicit one-cap allowlist; the
  #     only capability tailscaled actually needs. SYS_MODULE is unnecessary
  #     because the tun module is preloaded on the host (vm.bicep).
  #
  #     The container runs as root in its user namespace (no `user:` override)
  #     because Docker Compose has no way to set ambient capabilities and the
  #     stock tailscale/tailscale image has no file capabilities on
  #     /usr/local/bin/tailscaled. A non-root UID with `cap_add: NET_ADMIN`
  #     therefore exec()s with an empty effective set — TUNSETIFF and iptables
  #     calls fail with EPERM and tailscaled crash-loops. cap_drop ALL +
  #     cap_add NET_ADMIN + read_only + no-new-privileges yields a similarly
  #     bounded blast radius without that failure mode. True non-root would
  #     require a custom image (`setcap cap_net_admin+eip /usr/local/bin/tailscaled`)
  #     — deferred follow-up.
  #   - /dev/net/tun via `devices:` (not `volumes:`) so Docker's device cgroup
  #     is configured correctly. Default 0600 root:root perms are fine.
  #   - read_only: true root filesystem. tailscaled writes its socket to /tmp
  #     (tmpfs) and persistent state to /var/lib/tailscale (bind mount).
  #     Nothing else needs to be writable.
  #   - no-new-privileges (via x-common-keys-apps anchor) blocks setuid escalation.
  #   - TS_AUTH_ONCE=true so containerboot only consumes the auth key on first
  #     registration; subsequent restarts use cached state and never read the
  #     mounted secret value.
  tailscale:
    <<: *common-keys-apps
    image: tailscale/tailscale:v1.98.4@sha256:6146dfe83373a68b57379f8a748676971f036c418d8bc8f4ed3b6ba3f7cc04dc
    container_name: tailscale-proxy
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
    read_only: true
    tmpfs:
      # tailscaled writes its LocalAPI socket here (TS_SOCKET below).
      - /tmp:size=64m,mode=1777
      # Some tailscaled paths default to /var/run; keep a small writable scratch
      # so we don't hit silent failures on edge-case writes.
      - /run:size=8m,mode=1777
    # Host-published ports for the entire shared netns must be declared here
    # (services using network_mode: service:tailscale cannot declare their own).
    # TCP only — Java Edition is TCP, Velocity query is disabled in velocity.toml.
    ports:
      - "25565:25577/tcp"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    environment:
      # containerboot reads the auth key from this file (file: prefix on
      # TS_AUTHKEY has been supported since the early v1.x of containerboot).
      # The file is mounted by the `secrets:` block below and originates at
      # /opt/minecraft/secrets/ts_authkey on the host — which holds either
      # the live single-use key (during first registration) or a dead
      # placeholder (after tailscaled.state exists). See refresh-env.sh.
      TS_AUTHKEY: file:/run/secrets/ts_authkey
      TS_HOSTNAME: proxy-azure
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
      # Only attempt `tailscale up --authkey=...` if not already logged in.
      # Combined with persistent state on /var/lib/tailscale, this means the
      # mounted secret is consulted exactly once (first boot) and then ignored.
      TS_AUTH_ONCE: "true"
      # Don't let tailscaled rewrite /etc/resolv.conf — we have a read-only root
      # filesystem and the lobby doesn't need to resolve tailnet hostnames.
      TS_ACCEPT_DNS: "false"
      # Default socket path is /var/run/tailscale/tailscaled.sock which would
      # require /var/run/tailscale to exist and be writable. Pin to /tmp (tmpfs)
      # to avoid that dance.
      TS_SOCKET: /tmp/tailscaled.sock
      TZ: America/Los_Angeles
    secrets:
      - ts_authkey
    volumes:
      - /data/minecraft/tailscale:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    healthcheck:
      # `tailscale status` returns exit 0 even when the node is logged-out /
      # unauthenticated (it just describes the local-only state of the daemon).
      # `tailscale ip -4` only returns 0 once the node has been issued a tailnet
      # IPv4 by control plane — i.e. genuinely registered + online. That's the
      # precondition Velocity needs before it starts trying to dial C2E2 over
      # the tailnet, so we gate dependents off this.
      test: ["CMD", "tailscale", "--socket=/tmp/tailscaled.sock", "ip", "-4"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  ############################# PROXY
  velocity:
    <<: *common-keys-apps
    container_name: velocity
    # mc-proxy java17 — stays on Java 17 to be compatible with 1.20.1 backends
    image: itzg/mc-proxy:java17-2025.10.0@sha256:7043620f1ac866e86fee922c1c22a035800db95c2fe511778de4f22ac19e9f19
    # Shares tailscale's netns: inbound 25565 arrives via host port published
    # on the tailscale service; outbound to C2E2 uses the tailnet interface.
    network_mode: "service:tailscale"
    depends_on:
      tailscale:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    volumes:
      # velocity.toml and forwarding.secret are both written here by
      # refresh-env.sh before compose up. Do NOT add a single-file bind for
      # forwarding.secret on top — Linux mounts the parent /server bind after
      # the child, shadowing it, and Velocity then reads whatever itzg
      # generated in the data dir (see PR #154).
      - /data/minecraft/velocity:/server
    environment:
      TYPE: VELOCITY
      # 3.3.0-SNAPSHOT is the last Velocity release supporting Java 17 (3.4+ requires Java 21).
      # Pinned here so the itzg image doesn't auto-download a newer incompatible build.
      VELOCITY_VERSION: "3.3.0-SNAPSHOT"
      # Plugins (comma-separated list of jar URLs downloaded by itzg/mc-proxy at startup):
      #   Ambassador — required for Forge 1.13-1.20.1 behind Velocity. Handles Forge
      #     channel negotiation that vanilla Velocity can't.
      #   spark — JVM profiler / perf diagnostics (https://spark.lucko.me/). Lets ops
      #     run /spark profiler, /spark health, /spark tps inside Velocity to debug
      #     proxy-side latency, GC pauses, or thread contention. Modrinth has no
      #     Velocity build; pinned to lucko CI build #524 (spark 1.10.172).
      #   bungeecord-prometheus-exporter — white-box Velocity metrics (player counts,
      #     latency histograms, JVM stats) on :9985 for Prometheus scraping over tailnet.
      PLUGINS: "https://github.com/adde0109/Ambassador/releases/download/v1.4.5/Ambassador-Velocity-1.4.5-all.jar,https://ci.lucko.me/job/spark/524/artifact/spark-velocity/build/libs/spark-1.10.172-velocity.jar,https://github.com/weihao/bungeecord-prometheus-exporter/releases/download/3.2.7/bungeecord-prometheus-exporter-3.2.7.jar"
      # forwarding.secret lives at /server/forwarding.secret via the data-dir
      # bind mount above (refresh-env.sh writes it). itzg's startup detects
      # it and leaves it alone — no env-based fallback, no plaintext env var.
      TZ: America/Los_Angeles
    healthcheck:
      test: ["CMD", "mc-monitor", "status", "--host", "localhost", "--port", "25577"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  ############################# MONITORING SIDECARS
  # All share the tailscale netns. Metrics ports (8081/9080/9100/9985) are
  # reachable ONLY at the lobby tailnet IP — never published on the host.
  # Trade-off (same as Proxmox stack): node-exporter and cadvisor see the
  # tailscale netns's network interfaces, not the host's. CPU/mem/disk and
  # container metrics still work; host network interface stats do not.
  mc-monitor-exporter:
    <<: *common-keys-apps
    image: itzg/mc-monitor:0.16.7@sha256:f316952cbd0e3d01143f666e232879afd2d3085d522ba6cf4540b4ec0b826892
    container_name: mc-monitor-exporter
    # Shares tailscale netns — Velocity is reachable at localhost:25577 here.
    network_mode: "service:tailscale"
    depends_on:
      tailscale:
        condition: service_healthy
      velocity:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    command: ["export-for-prometheus"]
    environment:
      EXPORT_SERVERS: "localhost:25577"
      EXPORT_PORT: "8081"
      TZ: America/Los_Angeles

  node-exporter:
    <<: *common-keys-apps
    image: prom/node-exporter:v1.11.1@sha256:e9cff4fc67b1818f8c97adb115b9f12c9a54b533de86765d4a0effc01b357205
    container_name: node-exporter
    network_mode: "service:tailscale"
    # pid: host lets node-exporter see host processes even though it shares
    # tailscale's netns instead of the host's.
    pid: host
    depends_on:
      tailscale:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    volumes:
      - "/:/host:ro,rslave"
    environment:
      TZ: America/Los_Angeles
    command:
      - "--path.rootfs=/host"
      - "--web.listen-address=:9100"

  # cAdvisor — per-container CPU/mem/net/disk metrics on :8080 (tailnet only).
  # Tuned for a CPU-limited container: at the default --housekeeping_interval=1s
  # plus 0.25 CPU the stats loop runs continuously and Prometheus scrapes time
  # out ("context deadline exceeded"). See google/cadvisor#2622 — CPU limits
  # measurably slow /metrics collection. Bumped CPU + relaxed housekeeping fix that.
  cadvisor:
    <<: *common-keys-apps
    image: gcr.io/cadvisor/cadvisor:v0.55.1@sha256:3de2bd5203120b866d74a9b283b2ffb8ec382fbf9dc321814700c6ea6f44ec57
    container_name: cadvisor
    network_mode: "service:tailscale"
    privileged: true
    depends_on:
      tailscale:
        condition: service_healthy
    deploy:
      resources:
        limits:
          # 0.25 CPU + default 1s housekeeping → /metrics scrapes time out.
          # 0.5 CPU leaves enough headroom for both the stats loop and the scrape.
          cpus: '0.5'
          memory: 256M
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      # /dev/disk + /dev/kmsg are in the upstream google/cadvisor README's
      # canonical `docker run` example. Without them cadvisor can hang reading
      # kernel OOM messages and miss disk device detection on cgroup v2 hosts.
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    environment:
      TZ: America/Los_Angeles
    command:
      # --docker_only=true skips raw/systemd cgroup hierarchies (host slices,
      # user sessions). We only care about Docker container metrics — node-exporter
      # already covers host-level numbers.
      - --docker_only=true
      # 1s default is too aggressive for a CPU-limited container; 10s is plenty
      # for a 5-container compose stack and matches Prometheus's typical scrape
      # interval.
      - --housekeeping_interval=10s

  promtail:
    <<: *common-keys-apps
    image: grafana/promtail:3.6.11@sha256:a761cb834cfaeee29745440d4884d6748f0a08d8f68928db1d707018c1dcfbe9
    container_name: promtail
    network_mode: "service:tailscale"
    depends_on:
      tailscale:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      # Persist read-positions across redeploys so promtail doesn't re-ship
      # historical logs every time the deploy workflow recreates the container.
      - /data/minecraft/promtail:/var/lib/promtail
    configs:
      - source: promtail_config
        target: /etc/promtail/config.yaml
        mode: 0444
    environment:
      TZ: America/Los_Angeles
    command: ["-config.file=/etc/promtail/config.yaml"]

# ─────────────────────────────────────────────────────────────────────────────
# Top-level configs: block. Inline config avoids relative bind mounts and keeps
# all configuration version-controlled in this compose file.
# ─────────────────────────────────────────────────────────────────────────────
configs:
  # Promtail config → /etc/promtail/config.yaml inside the promtail container.
  # Positions persist via the /data/minecraft/promtail bind mount so log
  # read-offsets survive container recreation.
  # grpc_listen_port: 0 disables promtail's gRPC listener (we only push to Loki;
  # no need to expose another port on the host).
  promtail_config:
    content: |
      server:
        http_listen_port: 9080
        grpc_listen_port: 0
      positions:
        filename: /var/lib/promtail/positions.yaml
      clients:
        - url: http://loki-k8s.tail042ec7.ts.net:3100/loki/api/v1/push
      scrape_configs:
        - job_name: docker
          static_configs:
            - targets: [localhost]
              labels:
                instance: proxy-azure
                __path__: /var/lib/docker/containers/*/*.log
          pipeline_stages:
            - docker: {}
        - job_name: syslog
          static_configs:
            - targets: [localhost]
              labels:
                instance: proxy-azure
                __path__: /var/log/syslog

# ─────────────────────────────────────────────────────────────────────────────
# Top-level secrets: block. File-backed Compose secrets (this is plain Compose,
# not Swarm) are read-only bind mounts of the source file to /run/secrets/<name>
# inside the consuming container. Source perms (mode/uid/gid) flow through; the
# `mode:`/`uid:`/`gid:` keys on the service-side `secrets:` entry are Swarm-only
# and ignored here — refresh-env.sh sets the on-host file mode/owner explicitly.
#
# Only ts_authkey is declared here. The on-host file is owned 0:0 0400 (root)
# because the tailscale container runs as root in its userns (see the service
# hardening block for why). Its value is either the live auth key
# (only during first registration — refresh-env.sh swaps it out for a dead
# placeholder as soon as tailscaled.state exists) or a placeholder string that
# the tailnet control plane will reject. Either way, the secret value visible
# to a compromised container has bounded utility.
#
# velocity's forwarding.secret is NOT a Docker secret: itzg's startup runs
# `chown -R bungeecord:bungeecord /server` under `set -eo pipefail` and would
# fail EROFS on a read-only Compose-secret mount under /server. A single-file
# bind on top of the data-dir bind also doesn't work (parent shadows child,
# see PR #154). refresh-env.sh writes it straight into /data/minecraft/velocity/.
# ─────────────────────────────────────────────────────────────────────────────
secrets:
  ts_authkey:
    file: /opt/minecraft/secrets/ts_authkey
