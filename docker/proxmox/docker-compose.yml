---
# Proxmox stack: C2E2 (Forge + packwiz) behind TailScale, with tiered 3-2-1 backups.
# Managed by Portainer CE GitOps. Secrets come from Portainer's env-var UI; never
# hardcoded here. Build metadata (PACKWIZ_URL SHA, MOTD version) is inlined and
# rewritten in place by infra/azure/scripts/publish-prism-pack.ps1 on each publish.
# MC 1.20.1 ⇒ all server images MUST stay on java17 variants.
# Pre-create on host: /data/minecraft/{tailscale,c2e2,promtail,local-backups}

x-common-keys-apps: &common-keys-apps
  security_opt:
    - no-new-privileges:true
  restart: unless-stopped

x-backup-common: &backup-common
  <<: *common-keys-apps
  image: itzg/mc-backup:2026.6.0@sha256:e2be1f80347809cd233c8f8909b1e1a6025baa327864f84464f3e5057a0dcb90
  network_mode: "service:tailscale"
  depends_on:
    craft-to-exile-2:
      condition: service_healthy
  deploy:
    resources:
      limits:
        cpus: '0.5'
        memory: 512M
  volumes:
    - /data/minecraft/c2e2:/data:ro

x-backup-env-common: &backup-env-common
  RCON_HOST: localhost
  RCON_PORT: "25575"
  RCON_PASSWORD: ${RCON_PASSWORD}
  BACKUP_NAME: c2e2
  TZ: America/Los_Angeles

services:

  tailscale:
    <<: *common-keys-apps
    image: tailscale/tailscale:v1.98.4@sha256:6146dfe83373a68b57379f8a748676971f036c418d8bc8f4ed3b6ba3f7cc04dc
    container_name: tailscale-minecraft
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_HOSTNAME: ${TS_HOSTNAME}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
      TZ: America/Los_Angeles
    volumes:
      - /data/minecraft/tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    healthcheck:
      test: ["CMD", "tailscale", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  craft-to-exile-2:
    <<: *common-keys-apps
    image: itzg/minecraft-server:2026.6.0-java17@sha256:3fb55b2c2bf1f5fcef9c2665f4844b654bf5e3207e7ed51fb0f5d7a420ef403b
    container_name: mc-c2e2
    network_mode: "service:tailscale"
    tty: true
    stdin_open: true
    depends_on:
      tailscale:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '10'
          memory: 40G
    volumes:
      - /data/minecraft/c2e2:/data
    configs:
      - source: pcf_patch_def
        target: /patches/pcf-forwarding.json
        mode: 0444
    environment:
      EULA: "TRUE"
      TZ: America/Los_Angeles
      TYPE: FORGE
      VERSION: "1.20.1"
      # Must equal packwiz/pack.toml's [versions].forge. The import script
      # bumps both atomically; manual edits must touch both.
      FORGE_VERSION: "47.4.10"
      # SHA segment rewritten in place by publish-prism-pack.ps1; "main" is the
      # bootstrap default in effect before the first publish.
      PACKWIZ_URL: "https://raw.githubusercontent.com/camcast3/MinecraftInfra/ef7338d57e6b4a5034fd6e44581e965b8cc6c758/packwiz/pack.toml"
      ONLINE_MODE: "FALSE"
      ENABLE_ROLLING_LOGS: "true"
      # C2E2's Mine and Slash Dungeons fires world commands via command blocks.
      ENABLE_COMMAND_BLOCK: "TRUE"
      # Version segment rewritten in place by publish-prism-pack.ps1.
      MOTD: "Craft to Exile 2 v0.4.2"
      # 31G stays just under the ~32G compressed-oops cliff; 40G container
      # ceiling leaves headroom for off-heap (Netty, direct buffers, metaspace).
      MEMORY: "31G"
      # Portainer CE GitOps can't bind-mount repo files (BE-only feature), so
      # whitelist/ops come from raw GitHub URLs. SYNCHRONIZE makes git
      # authoritative — in-game /whitelist add and /op are reverted on restart.
      WHITELIST_FILE: https://raw.githubusercontent.com/camcast3/MinecraftInfra/main/docker/shared/whitelist.json
      OPS_FILE: https://raw.githubusercontent.com/camcast3/MinecraftInfra/main/docker/shared/ops.json
      EXISTING_WHITELIST_FILE: SYNCHRONIZE
      EXISTING_OPS_FILE: SYNCHRONIZE
      ENFORCE_WHITELIST: "TRUE"
      # Admin overlay (PCF + spark + prom-exporter) ships via packwiz with
      # side = "server"; configs come from docker/shared/config/ here. The mod
      # binds :19565 in onServerStarted, so prom scrapes will fail during boot
      # and restart windows — pair the alert with the mc-monitor SLP probe.
      APPLY_EXTRA_FILES: |-
        config<https://raw.githubusercontent.com/camcast3/MinecraftInfra/main/docker/shared/config/proxy-compatible-forge.toml
        world/serverconfig<https://raw.githubusercontent.com/camcast3/MinecraftInfra/main/docker/shared/config/prometheus_exporter-server.toml
      # Re-injects the Velocity forwarding secret on every start; patch JSON
      # lives in the top-level configs: block at the bottom of this file.
      PATCH_DEFINITIONS: /patches
      CFG_VELOCITY_FORWARDING_SECRET: ${VELOCITY_FORWARDING_SECRET}
      # High-latency player tuning (2 AUS players, ~200ms RTT)
      NETWORK_COMPRESSION_THRESHOLD: "512"
      PLAYER_IDLE_TIMEOUT: "0"
      MAX_TICK_TIME: "90000"
      VIEW_DISTANCE: "7"
      SIMULATION_DISTANCE: "5"
      ENABLE_RCON: "true"
      RCON_PORT: "25575"
      RCON_PASSWORD: ${RCON_PASSWORD}
    healthcheck:
      test: ["CMD", "mc-health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  # 3-2-1 backups: per-destination retention via PRUNE_BACKUPS_DAYS.
  # CRON_SCHEDULE staggered by ≥15 min so save-off windows never collide.

  backup-local:
    <<: *backup-common
    container_name: mc-c2e2-backup-local
    # YAML merge replaces sequences (doesn't concatenate), so the c2e2 ro mount
    # from x-backup-common is re-listed here alongside the /backups mount.
    volumes:
      - /data/minecraft/c2e2:/data:ro
      - /data/minecraft/local-backups:/backups
    environment:
      <<: *backup-env-common
      BACKUP_METHOD: tar
      DEST_DIR: /backups
      PRUNE_BACKUPS_DAYS: "14"
      # 12/day × 14d × ~349 MB ≈ ~57 GB on the VM.
      CRON_SCHEDULE: "0 */2 * * *"

  backup-nas:
    <<: *backup-common
    container_name: mc-c2e2-backup-nas
    environment:
      <<: *backup-env-common
      BACKUP_METHOD: rclone
      RCLONE_REMOTE: NAS
      RCLONE_DEST_DIR: ${NAS_BACKUP_PATH}
      PRUNE_BACKUPS_DAYS: "31"
      # 4/day × 31d × ~349 MB ≈ ~43 GB on the NAS.
      CRON_SCHEDULE: "15 */6 * * *"
      RCLONE_CONFIG_NAS_TYPE: smb
      RCLONE_CONFIG_NAS_HOST: ${NAS_HOST}
      RCLONE_CONFIG_NAS_USER: ${NAS_USER}
      # rclone's SMB backend rejects unobscured passwords; value must be
      # the output of `rclone obscure '<plaintext>'`.
      RCLONE_CONFIG_NAS_PASS: ${NAS_PASS_OBSCURED}
      # RCLONE_CONFIG_NAS_DOMAIN: ${NAS_DOMAIN}  # only if non-default workgroup

  backup-azure:
    <<: *backup-common
    container_name: mc-c2e2-backup-azure
    environment:
      <<: *backup-env-common
      BACKUP_METHOD: rclone
      RCLONE_REMOTE: AZBLOB
      RCLONE_DEST_DIR: minecraft-backups/c2e2
      PRUNE_BACKUPS_DAYS: "60"
      # 1/day × 60d × ~349 MB ≈ ~20 GB @ Cold GRS ≈ ~$0.40/mo.
      CRON_SCHEDULE: "30 4 * * *"
      RCLONE_CONFIG_AZBLOB_TYPE: azureblob
      RCLONE_CONFIG_AZBLOB_ACCOUNT: ${STORAGE_ACCOUNT}
      RCLONE_CONFIG_AZBLOB_TENANT: ${AZURE_TENANT_ID}
      RCLONE_CONFIG_AZBLOB_CLIENT_ID: ${AZURE_CLIENT_ID}
      RCLONE_CONFIG_AZBLOB_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
      RCLONE_CONFIG_AZBLOB_ACCESS_TIER: Cold
      # SP scope is the minecraft-backups container only, not the account —
      # skip rclone's preflight HEAD which would otherwise 403.
      RCLONE_CONFIG_AZBLOB_NO_CHECK_CONTAINER: "true"

  restarter:
    <<: *common-keys-apps
    # Reuses the MC image — rcon-cli already installed. Every 6h: warn at
    # 1h/30m/5m/1m/10s, then `stop`; restart: unless-stopped brings it back.
    image: itzg/minecraft-server:2026.6.0-java17@sha256:3fb55b2c2bf1f5fcef9c2665f4844b654bf5e3207e7ed51fb0f5d7a420ef403b
    container_name: mc-restarter
    network_mode: "service:tailscale"
    depends_on:
      craft-to-exile-2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M
    environment:
      RCON_PASSWORD: ${RCON_PASSWORD}
      TZ: America/Los_Angeles
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        rcon() { rcon-cli --host localhost --port 25575 --password "$RCON_PASSWORD" "$1"; }
        while true; do
          sleep 18000
          rcon "say §e[Server] Scheduled restart in 1 hour. Finish what you're doing!"
          sleep 1800
          rcon "say §6[Server] Restart in 30 minutes!"
          sleep 1500
          rcon "say §c[Server] Restart in 5 minutes! Find a safe spot and log off!"
          sleep 240
          rcon "say §8[Server] Restarting in 1 minute!"
          sleep 50
          rcon "say §8[Server] Restarting in 10 seconds..."
          sleep 10
          rcon "stop" || rcon "stop" || rcon "stop"
        done

  # All monitoring sidecars share the tailscale netns — endpoints reachable
  # only at <proxmox-tailnet-ip>:<port>. ports: is forbidden under
  # network_mode: service:tailscale. node-exporter/cadvisor miss some host
  # network metrics as a result; documented trade-off.

  mc-monitor-exporter:
    <<: *common-keys-apps
    image: itzg/mc-monitor:0.16.7@sha256:f316952cbd0e3d01143f666e232879afd2d3085d522ba6cf4540b4ec0b826892
    container_name: mc-monitor-exporter
    network_mode: "service:tailscale"
    depends_on:
      tailscale:
        condition: service_healthy
      craft-to-exile-2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    command: ["export-for-prometheus"]
    environment:
      EXPORT_SERVERS: "localhost:25565"
      EXPORT_PORT: "8081"
      TZ: America/Los_Angeles

  node-exporter:
    <<: *common-keys-apps
    image: prom/node-exporter:v1.11.1@sha256:e9cff4fc67b1818f8c97adb115b9f12c9a54b533de86765d4a0effc01b357205
    container_name: node-exporter
    network_mode: "service:tailscale"
    pid: host
    depends_on:
      tailscale:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    volumes:
      - "/:/host:ro,rslave"
    environment:
      TZ: America/Los_Angeles
    command:
      - "--path.rootfs=/host"
      - "--web.listen-address=:9100"

  cadvisor:
    <<: *common-keys-apps
    image: gcr.io/cadvisor/cadvisor:v0.55.1@sha256:3de2bd5203120b866d74a9b283b2ffb8ec382fbf9dc321814700c6ea6f44ec57
    container_name: cadvisor
    network_mode: "service:tailscale"
    privileged: true
    depends_on:
      tailscale:
        condition: service_healthy
    deploy:
      resources:
        limits:
          # 0.25 CPU + default 1s housekeeping → /metrics scrapes time out
          # (google/cadvisor#2622). 0.5 CPU + 10s housekeeping is comfortable.
          cpus: '0.5'
          memory: 256M
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      # /dev/disk + /dev/kmsg per upstream cadvisor canonical example —
      # without them cadvisor can hang on cgroup v2 hosts reading OOM events.
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    environment:
      TZ: America/Los_Angeles
    command:
      - --docker_only=true
      - --housekeeping_interval=10s

  promtail:
    <<: *common-keys-apps
    image: grafana/promtail:3.6.11@sha256:a761cb834cfaeee29745440d4884d6748f0a08d8f68928db1d707018c1dcfbe9
    container_name: promtail
    network_mode: "service:tailscale"
    depends_on:
      tailscale:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      # Persist read-positions so promtail doesn't re-ship logs on every redeploy.
      - /data/minecraft/promtail:/var/lib/promtail
    configs:
      - source: promtail_config
        target: /etc/promtail/config.yaml
        mode: 0444
    environment:
      TZ: America/Los_Angeles
    command: ["-config.file=/etc/promtail/config.yaml"]

# Inline configs (Portainer CE GitOps doesn't support relative-path volumes).
# PCF patch: `$$` is Compose's escape for a literal `$` — mc-image-helper's
# patch-files command does the actual ${ENV} substitution at container start.
configs:
  pcf_patch_def:
    content: |
      {
        "file": "/data/config/proxy-compatible-forge.toml",
        "ops": [
          {
            "$$set": {
              "path": "$$.forwarding.secret",
              "value": "$${CFG_VELOCITY_FORWARDING_SECRET}"
            }
          }
        ]
      }

  promtail_config:
    content: |
      server:
        http_listen_port: 9080
        grpc_listen_port: 0
      positions:
        filename: /var/lib/promtail/positions.yaml
      clients:
        - url: http://loki-k8s.tail042ec7.ts.net:3100/loki/api/v1/push
      scrape_configs:
        - job_name: docker
          static_configs:
            - targets: [localhost]
              labels:
                instance: proxmox-c2e2
                __path__: /var/lib/docker/containers/*/*.log
          pipeline_stages:
            - docker: {}
        - job_name: syslog
          static_configs:
            - targets: [localhost]
              labels:
                instance: proxmox-c2e2
                __path__: /var/log/syslog
