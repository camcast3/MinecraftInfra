title: NegativeZone Wiki
description: Server guides and info for the NegativeZone Minecraft network
url: "https://wiki.negativezone.cc"
baseurl: ""

remote_theme: just-the-docs/just-the-docs@v0.10.1

# Footer content
aux_links:
  "GitHub":
    - "https://github.com/camcast3/MinecraftInfra"

aux_links_new_tab: true

color_scheme: dark

# Navigation structure
nav_sort: case_insensitive

# Search
search_enabled: true
search.heading_level: 3

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-redirect-from

exclude:
  - README.md
  - LICENSE
